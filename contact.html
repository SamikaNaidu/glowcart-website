<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GlowCart - Contact Us</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="header"></div>

  <main>
    <section class="contact-page">
      <h2 class="section-title">Contact Us</h2>
      <p>Have any questions or feedback? We’d love to hear from you!</p>

      <form class="contact-form">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required />

        <label>Email Address</label>
        <input type="email" placeholder="Enter your email" required />

        <label>Subject</label>
        <input type="text" placeholder="Enter subject" required />

        <label>Message</label>
        <textarea placeholder="Enter your message" rows="5" required></textarea>

        <button type="submit">Send Message</button>
      </form>

      <div class="contact-info">
        <h3>Get in Touch</h3>
        <p>📍 Address: GlowCart, Fashion Street, India</p>
        <p>📧 Email: support@glowcart.com</p>
        <p>📞 Phone: +91 98765 43210</p>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="script.js"></script>
</body>
</html>
