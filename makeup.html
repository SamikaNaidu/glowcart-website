<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Makeup | GlowCart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <div id="header"></div>

  <!-- Makeup Banner -->
  <div class="makeup-banner">
    <h1>Glow Up with Makeup 💄</h1>
    <p>Explore the best in beauty & cosmetics</p>
  </div>

  <!-- Makeup Products Section -->
  <section class="shop-section">
    <h2 class="section-title">Makeup Collection</h2>

    <div class="product-grid" id="product-list">
      <!-- Products will be loaded dynamically -->
    </div>
  </section>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <!-- Footer -->
  <div id="footer"></div>

  <!-- Script -->
  <script src="script.js"></script>

</body>
</html>
